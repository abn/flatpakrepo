# Declarative list of apps published by this repository.
#
# Two source kinds (mutually exclusive per entry):
#   manifest  Build from a flatpak manifest checked into a submodule.
#             Requires `manifest` (path) and `runtime` (flathub-infra tag).
#   bundles   Import a prebuilt .flatpak release asset per architecture.
#             Each arch needs a `url` and `sha256`.
#
# Common fields:
#   id        Reverse-DNS application ID (must match the manifest's app-id).
#   arches    Optional. For manifest: list of arches to build; defaults to [x86_64].
#             For bundles: derived from the bundles keys.
#   branch    Optional. Flatpak channel; defaults to 'stable'.

apps:
  - id: ai.lemonade_server.Lemonade
    manifest: apps/ai.lemonade_server.Lemonade/ai.lemonade_server.Lemonade.yaml
    runtime: gnome-50
    arches: [x86_64]
    branch: stable

  - id: com.stacklok.ToolHive
    bundles:
      x86_64:
        url: https://github.com/stacklok/toolhive-studio/releases/download/v0.35.2/com.stacklok.ToolHive_x86_64.flatpak
        sha256: 2159fc643175dcf54f8b9293f48fb8b11577fa0ea5514c2af622ff922d349a4a
      aarch64:
        url: https://github.com/stacklok/toolhive-studio/releases/download/v0.35.2/com.stacklok.ToolHive_aarch64.flatpak
        sha256: a74e9855d8a66eaa03f9beff3c42b4973eb4ac91ed81f81db49da4599080960d
