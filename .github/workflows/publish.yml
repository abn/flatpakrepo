name: Publish Flatpak Repository

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      app:
        description: "Rebuild only this app id (leave blank to use change detection)."
        required: false
        type: string
        default: ""
      force-all:
        description: "Rebuild every app in apps.yaml."
        required: false
        type: boolean
        default: false
  schedule:
    # Weekly full rebuild so runtime image updates pick up upstream security fixes.
    - cron: "0 6 * * 0"

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

# Cross-run lock so a new push can't race a deploy already in flight.
concurrency:
  group: flatpakrepo-publish
  cancel-in-progress: false

jobs:
  plan:
    name: Plan build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      matrix-manifest: ${{ steps.plan.outputs.matrix-manifest }}
      matrix-bundle: ${{ steps.plan.outputs.matrix-bundle }}
      count: ${{ steps.plan.outputs.count }}
      count-manifest: ${{ steps.plan.outputs.count-manifest }}
      count-bundle: ${{ steps.plan.outputs.count-bundle }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Submodule pointer bumps are visible as gitlink changes in the parent
          # tree, so the submodule contents themselves are not needed here.
          fetch-depth: 0
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install pyyaml
        run: pip install pyyaml
        shell: bash

      - name: Compute build matrix
        id: plan
        env:
          FORCE: ${{ (github.event_name == 'schedule' || inputs.force-all) && 'all' || inputs.app }}
          BASE_SHA: ${{ github.event.before }}
        run: python .github/scripts/plan.py

  build-manifest:
    name: Build ${{ matrix.app-id }} (${{ matrix.arch }})
    needs: plan
    if: ${{ needs.plan.outputs.count-manifest != '0' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix-manifest) }}
    permissions:
      contents: read
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:${{ matrix.runtime }}
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build Flatpak
        uses: aetherpak/actions/build@v1
        with:
          manifest-path: ${{ matrix.manifest }}
          arch: ${{ matrix.arch }}
          branch: ${{ matrix.branch }}
          repo-path: _repo
          run-linter: false

      - name: Upload OSTree repository
        uses: actions/upload-artifact@v7
        with:
          name: repo-${{ matrix.app-id }}-${{ matrix.arch }}
          path: _repo
          retention-days: 1

  prep-bundle:
    name: Fetch ${{ matrix.app-id }} (${{ matrix.arch }})
    needs: plan
    if: ${{ needs.plan.outputs.count-bundle != '0' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix-bundle) }}
    permissions:
      contents: read
    steps:
      - name: Fetch and verify bundle
        env:
          URL: ${{ matrix.bundle-url }}
          SHA: ${{ matrix.bundle-sha256 }}
        run: |
          set -euo pipefail
          curl -fL --retry 3 -o bundle.flatpak "$URL"
          echo "$SHA  bundle.flatpak" | sha256sum -c -

      - name: Upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.app-id }}-${{ matrix.arch }}
          path: bundle.flatpak
          retention-days: 1

  publish-init:
    name: Seed site artifact
    needs: plan
    if: ${{ needs.plan.outputs.count != '0' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create empty site
        run: mkdir -p _site

      - name: Upload empty site
        uses: actions/upload-artifact@v7
        with:
          name: aetherpak-site
          path: _site
          include-hidden-files: true
          retention-days: 1
          if-no-files-found: ignore

  publish:
    name: Publish ${{ matrix.app-id }} (${{ matrix.arch }})
    needs: [plan, build-manifest, prep-bundle, publish-init]
    # Run when one of build-manifest or prep-bundle was skipped (no entries of
    # that kind selected).
    if: ${{ !cancelled() && !failure() && needs.plan.outputs.count != '0' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      # max-parallel: 1 + artifact pass-through serializes the index/static
      # write so cells never clobber each other's blobs or signatures.
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download running site
        uses: actions/download-artifact@v8
        with:
          name: aetherpak-site
          path: _site

      - name: Download OSTree repo
        if: ${{ matrix.source == 'manifest' }}
        uses: actions/download-artifact@v8
        with:
          name: repo-${{ matrix.app-id }}-${{ matrix.arch }}
          path: _repo

      - name: Download bundle
        if: ${{ matrix.source == 'bundle' }}
        uses: actions/download-artifact@v8
        with:
          name: bundle-${{ matrix.app-id }}-${{ matrix.arch }}
          path: _bundle

      - name: Publish
        uses: aetherpak/actions/publish@v1
        with:
          repo-path: _repo
          # Pass branch only for manifest source; bundle imports keep the
          # upstream ref's branch and overriding here would cause a mismatch in
          # the later `flatpak build-bundle --oci` step.
          bundle-path: ${{ matrix.source == 'bundle' && '_bundle/bundle.flatpak' || '' }}
          app-id: ${{ matrix.app-id }}
          arch: ${{ matrix.arch }}
          branch: ${{ matrix.source == 'manifest' && matrix.branch || '' }}
          pages-url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          upload-pages-artifact: "false"
          landing-page: "true"
          signing: auto
          gpg-private-key: ${{ secrets.AETHERPAK_GPG_KEY }}
          gpg-private-key-passphrase: ${{ secrets.AETHERPAK_GPG_KEY_PASSPHRASE }}

      - name: Re-upload site
        uses: actions/upload-artifact@v7
        with:
          name: aetherpak-site
          path: _site
          include-hidden-files: true
          retention-days: 1
          overwrite: true

  deploy:
    name: Deploy to Pages
    needs: [plan, publish]
    if: ${{ !cancelled() && !failure() && needs.plan.outputs.count != '0' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download final site
        uses: actions/download-artifact@v8
        with:
          name: aetherpak-site
          path: _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v5
