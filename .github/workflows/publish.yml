name: Publish Flatpak Repository

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      app:
        description: "Rebuild only this app id (leave blank to use change detection)."
        required: false
        type: string
        default: ""
      force-all:
        description: "Rebuild every app in aetherpak.yaml."
        required: false
        type: boolean
        default: false
  schedule:
    # Weekly full rebuild so runtime image updates pick up upstream security fixes.
    - cron: "0 6 * * 0"

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: flatpakrepo-publish
  cancel-in-progress: false

jobs:
  publish:
    uses: aetherpak/actions/.github/workflows/publish-multi.yml@v1
    with:
      config: aetherpak.yaml
      app: ${{ inputs.app || '' }}
      force-all: ${{ inputs.force-all || false }}
      workflow-path: .github/workflows/publish.yml
    secrets:
      gpg-private-key: ${{ secrets.AETHERPAK_GPG_KEY }}
      gpg-private-key-passphrase: ${{ secrets.AETHERPAK_GPG_KEY_PASSPHRASE }}
