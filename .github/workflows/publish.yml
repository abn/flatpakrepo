name: Publish Flatpak Repository

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      app:
        description: "Rebuild only this app id (leave blank to use change detection)."
        required: false
        type: string
        default: ""
      force-all:
        description: "Rebuild every app in aetherpak.yaml."
        required: false
        type: boolean
        default: false
      reconcile-only:
        description: "Skip build/publish; only reconcile the index against the registry and redeploy."
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: flatpakrepo-publish
  cancel-in-progress: false

jobs:
  publish:
    uses: aetherpak/actions/.github/workflows/publish-multi.yml@feat/unified-publish-workflow
    with:
      config: aetherpak.yaml
      app: ${{ inputs.app || '' }}
      force-all: ${{ inputs.force-all || false }}
      reconcile-only: ${{ inputs.reconcile-only || false }}
      workflow-path: .github/workflows/publish.yml
    secrets:
      gpg-private-key: ${{ secrets.AETHERPAK_GPG_KEY }}
      gpg-private-key-passphrase: ${{ secrets.AETHERPAK_GPG_KEY_PASSPHRASE }}
